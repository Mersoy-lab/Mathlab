<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathDocs — NYS Math Teacher Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a2e;--ink-mid:#4a4a6a;--ink-soft:#8888aa;
  --paper:#faf9f6;--paper-warm:#f3f0e8;--paper-card:#fff;
  --rule:#e2ddd5;--accent:#2563c8;--accent-light:#dbe8fb;--accent-mid:#5b8ce0;
  --green:#1a7a5e;--green-light:#d1f0e7;
  --gold:#b07d28;--gold-light:#fef3dc;
  --purple:#6d3fb5;--purple-light:#ede5ff;
  --red:#c0392b;--red-light:#fdecea;
  --nys:#003087;--nys-gold:#c8960c;
  --sh-sm:0 1px 3px rgba(26,26,46,.08);--sh-md:0 4px 16px rgba(26,26,46,.10);--sh-lg:0 12px 40px rgba(26,26,46,.14);
  --r:10px;--rl:16px;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.6}
nav{background:var(--paper-card);border-bottom:1px solid var(--rule);padding:0 1.5rem;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh-sm)}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.logo-mark{width:30px;height:30px;background:var(--nys);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-family:'DM Serif Display',serif;font-style:italic;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:10px}
.nys-badge{font-size:10.5px;background:#e8f0fb;color:var(--nys);padding:4px 10px;border-radius:20px;font-weight:600;border:1px solid #c5d8f7}
.hero{background:linear-gradient(135deg,#001f5c 0%,#003087 50%,#0a4dbf 100%);color:#fff;padding:2.2rem 2rem 1.8rem;text-align:center;position:relative;overflow:hidden}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-.02em;margin-bottom:.5rem;position:relative}
.tabs-bar{background:var(--paper-card);border-bottom:1px solid var(--rule);padding:0 1.5rem;display:flex;overflow-x:auto;position:sticky;top:58px;z-index:100}
.tab-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:0 18px;height:46px;border:none;background:transparent;color:var(--ink-soft);cursor:pointer;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn.active{color:var(--nys);border-bottom-color:var(--nys)}
.container{max-width:1000px;margin:0 auto;padding:1.75rem 1.25rem}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeUp .3s ease}
.section-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink);margin-bottom:.25rem}
.section-sub{font-size:12px;color:var(--ink-soft);margin-bottom:1.5rem}

/* HEATMAP STYLES */
.hm-insight{background:linear-gradient(135deg,#001f5c,#003087);color:#fff;border-radius:8px;padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.hm-course-btn{font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:1px solid var(--rule);background:#fff;cursor:pointer;margin-right:5px}
.hm-course-btn.active{background:var(--nys);color:#fff;border-color:var(--nys)}
.hm-section{margin-bottom:1.75rem;border:1px solid var(--rule);border-radius:8px;overflow:hidden;background:#fff}
.hm-section-title{background:var(--paper-warm);padding:.75rem 1rem;border-bottom:1px solid var(--rule);font-weight:600;color:var(--nys)}
.hm-row-header{display:grid;grid-template-columns:220px 1fr 60px 60px 80px;gap:8px;padding:.5rem 1rem;background:var(--paper-warm);font-size:10px;font-weight:600;color:var(--ink-soft);text-transform:uppercase}
.hm-row{display:grid;grid-template-columns:220px 1fr 60px 60px 80px;gap:8px;padding:.75rem 1rem;border-bottom:1px solid var(--rule);align-items:center;font-size:13px}
.hm-bar-wrap{height:18px;background:var(--paper-warm);border-radius:4px;overflow:hidden}
.hm-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;color:#fff;font-size:10px;font-weight:700}
.heat-5{background:#b91c1c}.heat-4{background:#dc2626}.heat-3{background:#ea580c}.heat-2{background:#d97706}.heat-1{background:#65a30d}
.fire-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.hm-samples-box{display:none;background:var(--paper-warm);padding:1rem;border-top:1px solid var(--rule);grid-column:1/-1}
.score-tab{padding:8px 16px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
.score-tab.active{border-bottom-color:var(--nys);color:var(--nys);font-weight:600}
.score-table{width:100%;border-collapse:collapse;margin-top:1rem;font-size:13px}
.score-table th{background:var(--nys);color:#fff;padding:8px;text-align:left}
.score-table td{padding:8px;border-bottom:1px solid var(--rule)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><div class="logo-mark">Σ</div>MathDocs</div>
  <div class="nav-right"><span class="nys-badge">NYS Next Gen Aligned</span></div>
</nav>

<div class="hero">
  <h1>Regents Performance & Heatmap</h1>
  <p>10-year question frequency analysis and official NYSED Next Gen blueprint weights.</p>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('heatmap')">🔥 Regents Heatmap</button>
  <button class="tab-btn" onclick="switchTab('scores')">📊 Score Conversion</button>
</div>

<div class="container">
  <div id="tab-heatmap" class="tab-panel active">
    <div id="hmCourseBtns" style="margin-bottom:1.5rem"></div>
    <div class="hm-insight" id="hmInsight"></div>
    <div id="hmGrid"></div>
  </div>

  <div id="tab-scores" class="tab-panel">
    <div class="section-title">NYS Regents Pass Score Conversion</div>
    <div class="section-sub">Official NYSED scale for current exams.</div>
    <div id="scoreTabs" style="display:flex;border-bottom:1px solid var(--rule)"></div>
    <div id="scoreTableWrap"></div>
  </div>
</div>

<script>
const HM_DATA = {
  alg1: {
    name: 'Algebra I',
    prediction: 'Linear functions, quadratic models & exponential growth dominate.',
    insights: ['🔥 Linear functions appear on EVERY exam','🔥 Quadratics = ~22% of total questions'],
    clusters: [
      { name: 'Linear Equations & Inequalities', bp: '~15%', topics: [
        { topic: 'Solving multi-step equations', count: 52, std: 'AI-A.REI.3', hot: true, samples: ['Solve for x: 3(2x-4)=2x+8'] },
        { topic: 'Word Problems / Context', count: 44, std: 'AI-A.CED.1', hot: true, samples: ['Write a linear equation for a taxi fare...'] }
      ]},
      { name: 'Quadratic Functions', bp: '~20%', topics: [
        { topic: 'Graphing Parabolas', count: 56, std: 'AI-F.IF.7a', hot: true, samples: ['Find the vertex of f(x)=x²-4x+3'] }
      ]}
    ]
  },
  geom: {
    name: 'Geometry',
    prediction: 'Proof writing dominates Parts 3-4.',
    insights: ['🔥 Triangle proofs on every exam','🔥 Trig (SOHCAHTOA) on every exam'],
    clusters: [
      { name: 'Congruence & Proofs', bp: '27-34%', topics: [
        { topic: 'Triangle Proofs', count: 50, std: 'GEO-G.CO.8', hot: true, samples: ['Prove △ABC ≅ △DEF'] }
      ]}
    ]
  },
  alg2: {
    name: 'Algebra II (2026 Prediction)',
    prediction: 'First-ever Next Gen Alg II Regents June 2026. Logs and Trig dominate.',
    insights: ['🔥 Logs & Exponentials appear on EVERY exam','🔥 Trig Functions = ~18% of weight'],
    clusters: [
      { name: 'Exponential & Logarithmic Functions', bp: '38-45%', topics: [
        { topic: 'Log Properties & Solving', count: 48, std: 'AII-F.LE.4', hot: true, samples: ['Solve: 2^x = 50', 'Expand: log(8x³/y)'] },
        { topic: 'Growth & Decay / e', count: 34, std: 'AII-F.LE.5', hot: true, samples: ['Continuous compounding problems'] }
      ]},
      { name: 'Trigonometric Functions', bp: '~18%', topics: [
        { topic: 'Sine/Cosine Graphing', count: 46, std: 'AII-F.TF.5', hot: true, samples: ['State amp/period/midline'] },
        { topic: 'Unit Circle / Radian Measure', count: 40, std: 'AII-F.TF.1', hot: false, samples: ['Find exact value: sin(5π/6)'] }
      ]}
    ]
  }
};

const SCORE_TABLES = {
  alg1: { max: 86, pass: 30, conversion: [[0,0],[30,65],[65,85],[86,100]] },
  geom: { max: 86, pass: 32, conversion: [[0,0],[32,65],[68,85],[86,100]] },
  alg2: { max: 86, pass: 27, conversion: [[0,0],[27,65],[63,85],[86,100]] }
};

let activeCourse = 'alg1';

function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

function initHeatmap() {
  const bar = document.getElementById('hmCourseBtns');
  bar.innerHTML = Object.keys(HM_DATA).map(c => 
    `<button class="hm-course-btn ${activeCourse===c?'active':''}" onclick="setCourse('${c}')">${HM_DATA[c].name}</button>`
  ).join('');

  const data = HM_DATA[activeCourse];
  document.getElementById('hmInsight').innerHTML = `<h4>📊 ${data.name} Analysis</h4><p>${data.prediction}</p><ul>${data.insights.map(i=>`<li>${i}</li>`).join('')}</ul>`;

  let html = '';
  data.clusters.forEach((cl, idx) => {
    html += `<div class="hm-section">
      <div class="hm-section-title">${cl.name} <span style="float:right; font-size:10px">${cl.bp}</span></div>
      <div class="hm-row-header"><div>Topic</div><div>Frequency</div><div>Cnt</div><div>%</div><div>Samples</div></div>
      ${cl.topics.map((t, tidx) => {
        const sid = `smp_${idx}_${tidx}`;
        const heat = t.count > 50 ? 'heat-5' : t.count > 40 ? 'heat-3' : 'heat-1';
        return `<div class="hm-row">
          <div>${t.topic} ${t.hot?'<span class="fire-badge">HOT</span>':''}</div>
          <div class="hm-bar-wrap"><div class="hm-bar-fill ${heat}" style="width:${t.count}%">${t.count}</div></div>
          <div style="text-align:center">${t.count}</div>
          <div style="text-align:center">${t.count}%</div>
          <button style="font-size:10px" onclick="toggleSamples('${sid}')">View</button>
          <div id="${sid}" class="hm-samples-box">${t.samples.map(s=>`<div>• ${s}</div>`).join('')}</div>
        </div>`;
      }).join('')}
    </div>`;
  });
  document.getElementById('hmGrid').innerHTML = html;
  renderScores();
}

function setCourse(c) { activeCourse = c; initHeatmap(); }
function toggleSamples(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function renderScores() {
  const st = SCORE_TABLES[activeCourse];
  document.getElementById('scoreTabs').innerHTML = Object.keys(SCORE_TABLES).map(c => 
    `<button class="score-tab ${activeCourse===c?'active':''}" onclick="setCourse('${c}')">${c.toUpperCase()}</button>`
  ).join('');
  
  document.getElementById('scoreTableWrap').innerHTML = `
    <table class="score-table">
      <thead><tr><th>Raw Score</th><th>Scale Score</th><th>Status</th></tr></thead>
      <tbody>
        ${st.conversion.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[1]>=65?'✅ Pass':'❌'}</td></tr>`).join('')}
      </tbody>
    </table>`;
}

initHeatmap();
</script>
</body>
</html>
